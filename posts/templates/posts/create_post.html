{% extends 'base.html' %}
{% load static %}

{% block title %}Create Post - Camly{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass p-4">
                <h2><i class="fas fa-plus" style="color: var(--accent-color);"></i> Create Post</h2>
                <p class="text-muted">Share what's on your mind</p>
                
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Post Type</label>
                        <select name="post_type" class="glass-input">
                            <option value="post">Post</option>
                            <option value="reel">Reel</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Content</label>
                        <textarea name="content" class="glass-input" rows="4" placeholder="What's on your mind?"></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Image (Optional)</label>
                        <input type="file" name="image" class="glass-input" accept="image/*">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Video (Optional)</label>
                        <input type="file" name="video" class="glass-input" accept="video/*">
                    </div>
                    
                    <button type="submit" class="glass-btn glass-btn-primary w-100">Publish</button>
                </form>
                
                <div class="mt-3">
                    <a href="{% url 'home' %}" class="btn w-100" style="background: var(--glass-bg); border: 1px solid var(--glass-border);">Cancel</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
