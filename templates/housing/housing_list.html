{% extends 'base.html' %}
{% load static %}

{% block title %}Housing - Camly{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="glass p-4">
                <h2><i class="fas fa-home" style="color: var(--accent-color);"></i> Housing</h2>
                <p class="text-muted">Find housing near campus</p>
                
                <div class="mt-4">
                    <div class="alert alert-info glass">
                        <i class="fas fa-info-circle me-2"></i>
                        Housing feature is coming soon! List and find accommodations.
                    </div>
                    
                    <div class="row g-3 mt-3">
                        <div class="col-md-6">
                            <div class="glass p-3">
                                <h6>Student Apartment</h6>
                                <p class="text-muted small">$500/month</p>
                                <span class="badge bg-success">Available</span>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="glass p-3">
                                <h6>Shared Room</h6>
                                <p class="text-muted small">$300/month</p>
                                <span class="badge bg-warning">Pending</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
