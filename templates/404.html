{% extends 'base.html' %}

{% block title %}Page Not Found - Camly{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="glass p-5">
                <i class="fas fa-search fa-4x text-muted mb-4"></i>
                <h1 class="display-1 fw-bold" style="color: var(--accent-color);">404</h1>
                <h2 class="mb-3">Page Not Found</h2>
                <p class="text-muted">The page you're looking for doesn't exist or has been moved.</p>
                <div class="mt-4">
                    <a href="{% url 'home' %}" class="glass-btn glass-btn-primary">
                        <i class="fas fa-home"></i> Go Home
                    </a>
                    <a href="javascript:history.back()" class="glass-btn ms-2">
                        <i class="fas fa-arrow-left"></i> Go Back
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
