{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<style>
    /* ===== Stories ===== */
    .stories-container {
        display: flex;
        gap: 16px;
        padding: 12px 4px;
        overflow-x: auto;
        scrollbar-width: none;
        align-items: center;
    }
    
    .stories-container::-webkit-scrollbar {
        display: none;
    }
    
    .story-ring-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        flex-shrink: 0;
        position: relative;
    }
    
    .story-ring {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        padding: 3px;
        background: linear-gradient(135deg, #f9a825, #f57c00, #e74c3c);
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .story-ring:hover {
        transform: scale(1.05);
    }
    
    .story-ring .story-avatar {
        width: 66px;
        height: 66px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid var(--bg-primary);
        background: var(--bg-primary);
    }
    
    .story-ring .story-avatar-placeholder {
        width: 66px;
        height: 66px;
        border-radius: 50%;
        background: linear-gradient(135deg, #1a237e, #0d47a1);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 1.8rem;
        border: 3px solid var(--bg-primary);
    }
    
    .story-ring .story-count {
        position: absolute;
        bottom: -2px;
        right: -2px;
        background: #e74c3c;
        color: white;
        font-size: 0.6rem;
        font-weight: 700;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid var(--bg-primary);
    }
    
    .story-ring-wrapper .story-username {
        font-size: 0.7rem;
        color: var(--text-secondary);
        max-width: 72px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        text-align: center;
    }
    
    /* Add Story Ring */
    .add-story-ring {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        border: 3px dashed var(--accent-color);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        color: var(--accent-color);
        background: var(--glass-bg);
        cursor: pointer;
        transition: all 0.3s;
        flex-shrink: 0;
        text-decoration: none;
    }
    
    .add-story-ring:hover {
        background: var(--accent-color);
        color: white;
        transform: scale(1.05);
    }
    
    /* ===== Story Modal ===== */
    .story-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        z-index: 9999;
        display: none;
        align-items: center;
        justify-content: center;
    }
    
    .story-modal-content {
        position: relative;
        max-width: 420px;
        width: 90%;
        max-height: 90vh;
        background: #000;
        border-radius: 16px;
        overflow: hidden;
        aspect-ratio: 9/16;
    }
    
    .story-modal-close {
        position: absolute;
        top: 15px;
        right: 15px;
        z-index: 100;
        background: rgba(0, 0, 0, 0.6);
        border: none;
        color: white;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        font-size: 1.2rem;
        cursor: pointer;
        transition: all 0.3s;
    }
    
    .story-modal-close:hover {
        background: rgba(255, 255, 255, 0.2);
    }
    
    .story-view {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        padding: 40px 20px;
        overflow: hidden;
    }
    
    .story-view .story-background {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
    }
    
    .story-view .story-media {
        position: relative;
        z-index: 1;
        width: 100%;
        max-height: 70%;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        border-radius: 12px;
    }
    
    .story-view .story-media img {
        width: 100%;
        height: auto;
        max-height: 70vh;
        object-fit: contain;
        border-radius: 12px;
    }
    
    .story-view .story-media video {
        width: 100%;
        height: auto;
        max-height: 70vh;
        object-fit: contain;
        border-radius: 12px;
        background: #000;
    }
    
    .story-view .story-text {
        position: relative;
        z-index: 2;
        margin-top: 15px;
        font-size: 1.2rem;
        text-align: center;
        max-width: 90%;
        word-wrap: break-word;
    }
    
    .story-view .story-text .text-bg {
        padding: 10px 20px;
        border-radius: 12px;
        display: inline-block;
    }
    
    .story-view .story-user {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 2;
        font-weight: 600;
        font-size: 1rem;
        background: rgba(0, 0, 0, 0.5);
        padding: 6px 16px;
        border-radius: 20px;
        backdrop-filter: blur(5px);
    }
    
    .story-view .story-views {
        position: absolute;
        bottom: 20px;
        right: 20px;
        z-index: 2;
        font-size: 0.8rem;
        opacity: 0.6;
        background: rgba(0, 0, 0, 0.5);
        padding: 4px 12px;
        border-radius: 12px;
        backdrop-filter: blur(5px);
    }
    
    .story-progress-container {
        position: absolute;
        top: 10px;
        left: 20px;
        right: 20px;
        z-index: 10;
        display: flex;
        gap: 4px;
    }
    
    .story-progress-bar {
        flex: 1;
        height: 3px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 2px;
        overflow: hidden;
    }
    
    .story-progress-bar .story-progress-fill {
        height: 100%;
        width: 0%;
        background: white;
        border-radius: 2px;
        transition: width 0.3s linear;
    }
    
    /* ===== Posts ===== */
    .post-card {
        background: var(--bg-card);
        backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
        transition: all 0.3s;
    }
    
    .post-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--card-hover-shadow);
    }
    
    .post-card .post-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
    }
    
    .post-card .post-header .avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--glass-border);
    }
    
    .post-card .post-header .username {
        font-weight: 600;
        color: var(--text-primary);
    }
    
    .post-card .post-header .time {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-left: auto;
    }
    
    .post-card .post-content {
        color: var(--text-primary);
        margin-bottom: 12px;
        line-height: 1.6;
    }
    
    .post-card .post-media {
        width: 100%;
        border-radius: 12px;
        margin: 12px 0;
        max-height: 500px;
        object-fit: cover;
    }
    
    .post-card .post-actions {
        display: flex;
        gap: 20px;
        padding-top: 12px;
        border-top: 1px solid var(--glass-border);
    }
    
    .post-card .post-actions button {
        background: none;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.3s;
        font-size: 0.9rem;
        padding: 5px 10px;
        border-radius: 8px;
    }
    
    .post-card .post-actions button:hover {
        background: var(--glass-bg);
        color: var(--accent-color);
    }
    
    .post-card .post-actions button.liked {
        color: #e74c3c;
    }
    
    .post-card .post-actions button.liked i {
        font-weight: 900;
    }
    
    .post-card .comments-section {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--glass-border);
    }
    
    .post-card .comments-section .comment {
        display: flex;
        gap: 10px;
        padding: 8px 0;
        align-items: flex-start;
    }
    
    .post-card .comments-section .comment .comment-user {
        font-weight: 600;
        color: var(--text-primary);
        font-size: 0.9rem;
        white-space: nowrap;
    }
    
    .post-card .comments-section .comment .comment-text {
        color: var(--text-secondary);
        font-size: 0.9rem;
        word-break: break-word;
    }
    
    .post-card .comment-input {
        display: flex;
        gap: 10px;
        margin-top: 10px;
    }
    
    .post-card .comment-input input {
        flex: 1;
        padding: 8px 14px;
        border-radius: 20px;
        border: 1px solid var(--glass-border);
        background: var(--input-bg);
        color: var(--text-primary);
    }
    
    .post-card .comment-input input:focus {
        outline: none;
        border-color: var(--accent-color);
    }
    
    .post-card .comment-input button {
        padding: 8px 20px;
        border-radius: 20px;
        border: none;
        background: var(--accent-color);
        color: white;
        cursor: pointer;
        font-weight: 500;
        transition: all 0.3s;
    }
    
    .post-card .comment-input button:hover {
        transform: scale(1.02);
        box-shadow: 0 4px 15px var(--accent-glow);
    }
    
    /* ===== Reels Grid ===== */
    .reels-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
        margin-top: 20px;
    }
    
    .reel-item {
        position: relative;
        aspect-ratio: 9/16;
        border-radius: 16px;
        overflow: hidden;
        background: #1a1a2e;
        cursor: pointer;
        transition: all 0.3s;
        border: 2px solid var(--glass-border);
    }
    
    .reel-item:hover {
        transform: scale(1.02);
        box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        border-color: var(--accent-color);
    }
    
    .reel-item video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
    }
    
    .reel-item .reel-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 20px;
        background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
        color: white;
        pointer-events: none;
    }
    
    .reel-item .reel-overlay .reel-caption {
        font-size: 0.85rem;
        font-weight: 500;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    
    .reel-item .reel-overlay .reel-views {
        font-size: 0.75rem;
        opacity: 0.7;
        margin-top: 4px;
    }
    
    .reel-item .reel-play-icon {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 3rem;
        opacity: 0.6;
        text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        pointer-events: none;
        transition: all 0.3s;
    }
    
    .reel-item:hover .reel-play-icon {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.1);
    }
    
    /* ===== Create FAB ===== */
    .create-fab {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #1a237e, #0d47a1);
        color: white;
        border: none;
        font-size: 1.8rem;
        box-shadow: 0 8px 30px rgba(26, 35, 126, 0.4);
        cursor: pointer;
        transition: all 0.3s;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
    }
    
    .create-fab:hover {
        transform: scale(1.1);
        box-shadow: 0 12px 40px rgba(26, 35, 126, 0.6);
        color: white;
    }
    
    .create-fab-options {
        position: fixed;
        bottom: 100px;
        right: 30px;
        display: none;
        flex-direction: column;
        gap: 10px;
        z-index: 999;
    }
    
    .create-fab-options.show {
        display: flex;
    }
    
    .create-fab-options .fab-option {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: none;
        color: white;
        font-size: 1.2rem;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    
    .create-fab-options .fab-option:hover {
        transform: scale(1.1);
    }
    
    .fab-option-story {
        background: linear-gradient(135deg, #f9a825, #f57c00);
    }
    
    .fab-option-post {
        background: linear-gradient(135deg, #4caf50, #2e7d32);
    }
    
    .fab-option-reel {
        background: linear-gradient(135deg, #e74c3c, #c0392b);
    }
    
    /* ===== Responsive ===== */
    @media (max-width: 768px) {
        .reels-grid {
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        }
        .create-fab {
            width: 50px;
            height: 50px;
            font-size: 1.5rem;
            bottom: 20px;
            right: 20px;
        }
        .create-fab-options {
            bottom: 80px;
            right: 20px;
        }
        .create-fab-options .fab-option {
            width: 45px;
            height: 45px;
            font-size: 1rem;
        }
        .story-ring {
            width: 60px;
            height: 60px;
        }
        .story-ring .story-avatar {
            width: 54px;
            height: 54px;
        }
        .story-ring .story-avatar-placeholder {
            width: 54px;
            height: 54px;
            font-size: 1.4rem;
        }
        .add-story-ring {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
        }
        .story-ring-wrapper .story-username {
            font-size: 0.6rem;
            max-width: 60px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="home-container">
    <h1 class="text-center text-white mb-4">
        <i class="fas fa-graduation-cap text-nature"></i>
        Welcome to Camly!
    </h1>
    
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card glass p-4">
                <h3 class="text-nature-light">
                    <i class="fas fa-users me-2"></i>
                    Campus Community Platform
                </h3>
                <p class="text-white-50">
                    Connect with students, share resources, and stay updated with campus life.
                </p>
                
                <div class="row mt-4 g-3">
                    <div class="col-6 col-md-3">
                        <a href="{% url 'chat:chat_home' %}" class="btn btn-primary w-100">
                            <i class="fas fa-comments"></i> Chat
                        </a>
                    </div>
                    <div class="col-6 col-md-3">
                        <a href="{% url 'groups:group_list' %}" class="btn btn-primary w-100">
                            <i class="fas fa-users"></i> Groups
                        </a>
                    </div>
                    <div class="col-6 col-md-3">
                        <a href="{% url 'events:event_list' %}" class="btn btn-primary w-100">
                            <i class="fas fa-calendar"></i> Events
                        </a>
                    </div>
                    <div class="col-6 col-md-3">
                        <a href="{% url 'housing:housing_list' %}" class="btn btn-primary w-100">
                            <i class="fas fa-home"></i> Housing
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
