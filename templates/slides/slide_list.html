{% extends 'base.html' %}
{% load static %}

{% block title %}Gallery - Camly{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="glass p-4">
                <h2><i class="fas fa-images" style="color: var(--accent-color);"></i> Gallery</h2>
                <p class="text-muted">View campus photos and videos</p>
                
                <div class="mt-4">
                    <div class="alert alert-info glass">
                        <i class="fas fa-info-circle me-2"></i>
                        Gallery feature is coming soon! View campus photos and videos.
                    </div>
                    
                    <div class="row g-3 mt-3">
                        <div class="col-md-4">
                            <div class="glass p-3 text-center">
                                <i class="fas fa-image fa-3x" style="color: var(--accent-color);"></i>
                                <h6 class="mt-2">Campus Tour</h6>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="glass p-3 text-center">
                                <i class="fas fa-image fa-3x" style="color: var(--accent-color);"></i>
                                <h6 class="mt-2">Graduation 2025</h6>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="glass p-3 text-center">
                                <i class="fas fa-image fa-3x" style="color: var(--accent-color);"></i>
                                <h6 class="mt-2">Student Life</h6>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
