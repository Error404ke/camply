{% extends 'base.html' %}
{% load static %}

{% block title %}Notifications - Camly{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="glass p-4">
                <h2><i class="fas fa-bell" style="color: var(--accent-color);"></i> Notifications</h2>
                <p class="text-muted">Your notifications</p>
                
                <div class="mt-4">
                    <div class="alert alert-info glass">
                        <i class="fas fa-info-circle me-2"></i>
                        You have no unread notifications.
                    </div>
                    
                    <div class="list-group mt-3">
                        <div class="list-group-item glass mb-2">
                            <h6>Welcome to Camly!</h6>
                            <p class="text-muted small">2 hours ago</p>
                            <span class="badge bg-primary">New</span>
                        </div>
                        <div class="list-group-item glass mb-2">
                            <h6>New event added</h6>
                            <p class="text-muted small">1 day ago</p>
                            <span class="badge bg-secondary">Read</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
