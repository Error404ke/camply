{% extends 'base.html' %}

{% block title %}Student Dashboard - Camly{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="glass p-4 text-center">
                <i class="fas fa-graduation-cap fa-4x" style="color: var(--accent-color);"></i>
                <h1 class="mt-3">Welcome, {{ user.username }}!</h1>
                <p class="text-muted">Student Dashboard</p>
                
                <div class="row mt-4 g-3">
                    <div class="col-md-3">
                        <div class="glass p-3">
                            <i class="fas fa-comments fa-2x" style="color: var(--accent-color);"></i>
                            <h6>Chat</h6>
                            <small class="text-muted">Connect</small>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="glass p-3">
                            <i class="fas fa-users fa-2x" style="color: var(--accent-color);"></i>
                            <h6>Groups</h6>
                            <small class="text-muted">Learn</small>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="glass p-3">
                            <i class="fas fa-calendar fa-2x" style="color: var(--accent-color);"></i>
                            <h6>Events</h6>
                            <small class="text-muted">Explore</small>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="glass p-3">
                            <i class="fas fa-home fa-2x" style="color: var(--accent-color);"></i>
                            <h6>Housing</h6>
                            <small class="text-muted">Find</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
