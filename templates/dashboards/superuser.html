{% extends 'base.html' %}

{% block title %}Superuser Dashboard - Camly{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="glass p-4 text-center">
                <i class="fas fa-crown fa-4x" style="color: var(--accent-color);"></i>
                <h1 class="mt-3">Welcome, {{ user.username }}!</h1>
                <p class="text-muted">Superuser Dashboard</p>
                
                <div class="row mt-4 g-3">
                    <div class="col-md-3">
                        <a href="{% url 'accounts:manage_users' %}" class="text-decoration-none">
                            <div class="glass p-3">
                                <i class="fas fa-users fa-2x" style="color: var(--accent-color);"></i>
                                <h6>Users</h6>
                                <small>Manage</small>
                            </div>
                        </a>
                    </div>
                    <div class="col-md-3">
                        <a href="{% url 'accounts:manage_landlords' %}" class="text-decoration-none">
                            <div class="glass p-3">
                                <i class="fas fa-home fa-2x" style="color: var(--accent-color);"></i>
                                <h6>Landlords</h6>
                                <small>Approve</small>
                            </div>
                        </a>
                    </div>
                    <div class="col-md-3">
                        <a href="/admin/" class="text-decoration-none">
                            <div class="glass p-3">
                                <i class="fas fa-cog fa-2x" style="color: var(--accent-color);"></i>
                                <h6>Django Admin</h6>
                                <small>Full access</small>
                            </div>
                        </a>
                    </div>
                    <div class="col-md-3">
                        <div class="glass p-3">
                            <i class="fas fa-database fa-2x" style="color: var(--accent-color);"></i>
                            <h6>System</h6>
                            <small>Overview</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
