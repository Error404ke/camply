{% extends 'base.html' %}
{% load static %}

{% block title %}Students - Camly{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="glass p-4">
                <h2><i class="fas fa-user" style="color: var(--accent-color);"></i> Students</h2>
                <p class="text-muted">Connect with other students</p>
                
                <div class="mt-4">
                    <div class="alert alert-info glass">
                        <i class="fas fa-info-circle me-2"></i>
                        Connect with fellow students on Camly!
                    </div>
                    
                    <div class="row g-3 mt-3">
                        <div class="col-md-4">
                            <div class="glass p-3 text-center">
                                <i class="fas fa-user-circle fa-3x" style="color: var(--accent-color);"></i>
                                <h6 class="mt-2">John Doe</h6>
                                <span class="badge bg-success">Online</span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="glass p-3 text-center">
                                <i class="fas fa-user-circle fa-3x" style="color: var(--accent-color);"></i>
                                <h6 class="mt-2">Jane Smith</h6>
                                <span class="badge bg-secondary">Offline</span>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="glass p-3 text-center">
                                <i class="fas fa-user-circle fa-3x" style="color: var(--accent-color);"></i>
                                <h6 class="mt-2">Mike Johnson</h6>
                                <span class="badge bg-success">Online</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
