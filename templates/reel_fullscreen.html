{% load static %}
<!-- Full Screen Reel Modal -->
<div id="reelModal" class="reel-modal" style="display: none;">
    <div class="reel-modal-content">
        <button class="reel-close-btn" onclick="closeReel()">
            <i class="fas fa-times"></i>
        </button>
        
        <div class="reel-container" id="reelContainer">
            <div class="reel-video-wrapper" id="reelVideoWrapper">
                <video id="reelFullVideo" controls autoplay playsinline>
                    <source src="" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            
            <div class="reel-info">
                <div class="reel-user-info">
                    <div class="reel-avatar-wrapper">
                        {% if user.profile.profile_picture %}
                        <img src="{{ user.profile.profile_picture.url }}" alt="{{ user.username }}" class="reel-avatar">
                        {% else %}
                        <div class="reel-avatar-placeholder">
                            <i class="fas fa-user"></i>
                        </div>
                        {% endif %}
                    </div>
                    <div class="reel-username">{{ user.username }}</div>
                </div>
                
                <div class="reel-caption-full" id="reelCaptionFull">
                    <span class="reel-username-small">{{ user.username }}</span>
                    <span class="reel-caption-text"></span>
                </div>
                
                <div class="reel-actions">
                    <button onclick="toggleReelLike()" id="reelLikeBtn" class="reel-action-btn">
                        <i class="fas fa-heart"></i>
                        <span id="reelLikeCount">0</span>
                    </button>
                    <button onclick="shareReel()" class="reel-action-btn">
                        <i class="fas fa-share"></i>
                    </button>
                </div>
                
                <div class="reel-views-info">
                    <i class="fas fa-eye"></i>
                    <span id="reelViewsCount">0</span> views
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* ===== Full Screen Reel Modal ===== */
    .reel-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        z-index: 9999;
        display: none;
        align-items: center;
        justify-content: center;
        animation: reelFadeIn 0.3s ease-out;
    }
    
    @keyframes reelFadeIn {
        from {
            opacity: 0;
            transform: scale(0.95);
        }
        to {
            opacity: 1;
            transform: scale(1);
        }
    }
    
    .reel-modal-content {
        position: relative;
        width: 100%;
        max-width: 500px;
        height: 90vh;
        max-height: 800px;
        background: #000;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        margin: 20px;
    }
    
    .reel-close-btn {
        position: absolute;
        top: 15px;
        right: 15px;
        z-index: 100;
        background: rgba(0, 0, 0, 0.6);
        border: none;
        color: white;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        font-size: 1.2rem;
        cursor: pointer;
        transition: all 0.3s;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .reel-close-btn:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1.1);
    }
    
    .reel-container {
        display: flex;
        flex-direction: column;
        height: 100%;
        background: #000;
    }
    
    .reel-video-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        position: relative;
        overflow: hidden;
    }
    
    .reel-video-wrapper video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    
    .reel-info {
        padding: 16px 20px;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.4), transparent);
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        color: white;
    }
    
    .reel-user-info {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
    }
    
    .reel-avatar-wrapper {
        flex-shrink: 0;
    }
    
    .reel-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--accent-color);
    }
    
    .reel-avatar-placeholder {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, #1a237e, #0d47a1);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 1.2rem;
    }
    
    .reel-username {
        font-weight: 600;
        font-size: 1rem;
    }
    
    .reel-caption-full {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        font-size: 0.95rem;
        line-height: 1.4;
    }
    
    .reel-username-small {
        font-weight: 600;
        white-space: nowrap;
    }
    
    .reel-caption-text {
        opacity: 0.9;
        word-break: break-word;
    }
    
    .reel-actions {
        display: flex;
        gap: 20px;
        margin-bottom: 8px;
    }
    
    .reel-action-btn {
        background: none;
        border: none;
        color: white;
        font-size: 1.2rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 10px;
        transition: all 0.3s;
    }
    
    .reel-action-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: scale(1.05);
    }
    
    .reel-action-btn.liked {
        color: #e74c3c;
    }
    
    .reel-action-btn.liked i {
        font-weight: 900;
    }
    
    .reel-views-info {
        font-size: 0.8rem;
        opacity: 0.6;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    
    /* ===== Swipe/Click Navigation ===== */
    .reel-nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0, 0, 0, 0.4);
        border: none;
        color: white;
        width: 40px;
        height: 80px;
        font-size: 1.5rem;
        cursor: pointer;
        transition: all 0.3s;
        backdrop-filter: blur(5px);
        z-index: 50;
    }
    
    .reel-nav-btn:hover {
        background: rgba(255, 255, 255, 0.2);
    }
    
    .reel-nav-btn.prev {
        left: 0;
        border-radius: 0 10px 10px 0;
    }
    
    .reel-nav-btn.next {
        right: 0;
        border-radius: 10px 0 0 10px;
    }
    
    /* ===== Loading Spinner ===== */
    .reel-spinner {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 50px;
        height: 50px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top: 3px solid #f9a825;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        display: none;
    }
    
    @keyframes spin {
        0% { transform: translate(-50%, -50%) rotate(0deg); }
        100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    
    /* ===== Responsive ===== */
    @media (max-width: 600px) {
        .reel-modal-content {
            height: 100vh;
            max-height: 100vh;
            border-radius: 0;
            margin: 0;
            max-width: 100%;
        }
        
        .reel-info {
            padding: 12px 16px;
        }
        
        .reel-close-btn {
            top: 10px;
            right: 10px;
            width: 35px;
            height: 35px;
            font-size: 1rem;
        }
        
        .reel-avatar {
            width: 35px;
            height: 35px;
        }
        
        .reel-username {
            font-size: 0.9rem;
        }
        
        .reel-caption-full {
            font-size: 0.85rem;
        }
    }
</style>

<script>
    let currentReelData = null;
    let reelLiked = false;
    
    function openReel(videoUrl, caption, username, views) {
        const modal = document.getElementById('reelModal');
        const video = document.getElementById('reelFullVideo');
        const captionText = document.querySelector('.reel-caption-text');
        const usernameSmall = document.querySelector('.reel-username-small');
        const viewsCount = document.getElementById('reelViewsCount');
        const likeCount = document.getElementById('reelLikeCount');
        const likeBtn = document.getElementById('reelLikeBtn');
        
        // Set video source
        const source = video.querySelector('source');
        source.src = videoUrl;
        video.load();
        video.play();
        
        // Set caption and user info
        captionText.textContent = caption || 'No caption';
        usernameSmall.textContent = username;
        viewsCount.textContent = views || 0;
        likeCount.textContent = 0;
        likeBtn.classList.remove('liked');
        reelLiked = false;
        
        // Store data
        currentReelData = {
            videoUrl: videoUrl,
            caption: caption,
            username: username,
            views: views
        };
        
        // Show modal
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    
    function closeReel() {
        const modal = document.getElementById('reelModal');
        const video = document.getElementById('reelFullVideo');
        video.pause();
        modal.style.display = 'none';
        document.body.style.overflow = '';
    }
    
    function toggleReelLike() {
        const likeBtn = document.getElementById('reelLikeBtn');
        const likeCount = document.getElementById('reelLikeCount');
        
        if (reelLiked) {
            likeBtn.classList.remove('liked');
            likeCount.textContent = parseInt(likeCount.textContent) - 1;
            reelLiked = false;
        } else {
            likeBtn.classList.add('liked');
            likeCount.textContent = parseInt(likeCount.textContent) + 1;
            reelLiked = true;
        }
    }
    
    function shareReel() {
        if (navigator.share) {
            navigator.share({
                title: 'Check out this reel on Camly',
                text: currentReelData?.caption || 'Check out this reel!',
                url: window.location.href,
            }).catch(() => {});
        } else {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert('Link copied to clipboard!');
            }).catch(() => {
                alert('Share this reel with your friends!');
            });
        }
    }
    
    // Close modal on Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeReel();
        }
    });
    
    // Close modal on overlay click
    document.getElementById('reelModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeReel();
        }
    });
</script>
