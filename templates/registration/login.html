<!DOCTYPE html>
<html>
<head>
    <title>Camly - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 40%, #0d0d3b 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(249, 168, 37, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 32px 32px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 8px;
        }
        
        .logo h1 {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .logo h1 i {
            color: #f9a825;
            margin-right: 8px;
        }
        
        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            margin-bottom: 28px;
            letter-spacing: 0.3px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }
        
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }
        
        .form-group input:focus {
            border-color: #f9a825;
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 0 3px rgba(249, 168, 37, 0.08);
        }
        
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 4px 0 20px;
        }
        
        .form-options label {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .form-options label input[type="checkbox"] {
            accent-color: #f9a825;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        
        .form-options a {
            color: #f9a825;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .form-options a:hover {
            color: #ff6f00;
            text-decoration: underline;
        }
        
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f9a825, #f57f17);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 4px;
            letter-spacing: 0.3px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(249, 168, 37, 0.25);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-primary i {
            margin-right: 8px;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0 20px;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.06);
        }
        
        .divider span {
            padding: 0 16px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .social-login {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .social-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
            color: #fff;
        }
        
        .social-btn i {
            margin-right: 8px;
            font-size: 16px;
        }
        
        .social-btn.google i {
            color: #ea4335;
        }
        
        .social-btn.facebook i {
            color: #1877f2;
        }
        
        .footer-text {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
        }
        
        .footer-text a {
            color: #f9a825;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .footer-text a:hover {
            color: #ff6f00;
            text-decoration: underline;
        }
        
        .error-messages {
            background: rgba(244, 67, 54, 0.08);
            border: 1px solid rgba(244, 67, 54, 0.15);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: #ef5350;
            font-size: 14px;
            text-align: center;
        }
        
        .error-messages i {
            margin-right: 8px;
        }
        
        .success-message {
            background: rgba(76, 175, 80, 0.08);
            border: 1px solid rgba(76, 175, 80, 0.15);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: #66bb6a;
            font-size: 14px;
            text-align: center;
        }
        
        .success-message i {
            margin-right: 8px;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 28px 20px 24px;
            }
            
            .logo h1 {
                font-size: 24px;
            }
            
            .social-login {
                flex-direction: column;
            }
            
            .form-options {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1><i class="fas fa-graduation-cap"></i>Camly</h1>
        </div>
        <p class="subtitle">Welcome back</p>
        
        {% if messages %}
            {% for message in messages %}
                <div class="success-message">
                    <i class="fas fa-check-circle"></i> {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        {% if form.errors %}
            <div class="error-messages">
                <i class="fas fa-exclamation-circle"></i> Invalid username or password
            </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Username" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            
            <div class="form-options">
                <label>
                    <input type="checkbox" name="remember"> Remember me
                </label>
                <a href="#">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn-primary">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        
        <div class="divider">
            <span>Or Sign in with</span>
        </div>
        
        <div class="social-login">
            <a href="#" class="social-btn google">
                <i class="fab fa-google"></i> Google
            </a>
            <a href="#" class="social-btn facebook">
                <i class="fab fa-facebook"></i> Facebook
            </a>
        </div>
        
        <p class="footer-text">
            Don't have an account? <a href="{% url 'accounts:register' %}">Signup</a>
        </p>
    </div>
</body>
</html>
