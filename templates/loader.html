{% load static %}

<!-- Clean 2D University-Themed Loading Animation -->
<div class="loader-overlay" id="loaderOverlay">
    <!-- Background Particles -->
    <div class="loader-particles">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span>
    </div>
    
    <div class="loader-glow"></div>
    
    <!-- 2D Icon with Rotating Rings -->
    <div class="loader-icon-container">
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
        <i class="fas fa-graduation-cap loader-icon"></i>
    </div>
    
    <!-- Loading Text -->
    <div class="loader-brand">
        <div class="brand-name">Camly</div>
        <div class="brand-sub">Campus Community Platform</div>
    </div>
    
    <!-- Progress Bar -->
    <div class="loader-progress-container">
        <div class="loader-progress-bar"></div>
    </div>
    
    <!-- Percentage -->
    <div class="loader-percentage" id="loaderPercentage">
        Loading<span class="loading-dots"></span>
    </div>
</div>
